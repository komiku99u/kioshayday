<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <title>DOLE'S KINGDOM</title>

    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="mobile-frame">
      <!-- COVER -->
      <div class="header">
        <img src="assets/images/cover.png" alt="Cover" />
      </div>

      <div class="top-info">
        <div id="waktu"></div>
      </div>

      <div class="checkout-header">
        <a href="index.html" class="back-btn">
          <span class="back-arrow">←</span>

          <span class="back-text"> Kembali </span>
        </a>

        <div class="checkout-title" id="checkoutTitle">
          KONFIRMASI PEMBAYARAN
        </div>
      </div>

      <div class="content">
        <div class="qris-box">
          <h3>QRIS PEMBAYARAN.</h3>

          <br />

          <img src="assets/images/qris.jpg" alt="QRIS" />
        </div>
        <button
          class="button"
          onclick="window.open('https://wa.link/d5e1k8', '_blank')"
        >
          <img
            src="assets/images/whatsapp.svg.webp"
            class="wa-icon"
            alt="WhatsApp"
          />
          KIRIM BUKTI PEMBAYARAN
        </button>
      </div>
    </div>
    <script>
      function updateWaktu() {
        const sekarang = new Date();

        const hari = [
          "Minggu",
          "Senin",
          "Selasa",
          "Rabu",
          "Kamis",
          "Jumat",
          "Sabtu",
        ];

        const bulan = [
          "Januari",
          "Februari",
          "Maret",
          "April",
          "Mei",
          "Juni",
          "Juli",
          "Agustus",
          "September",
          "Oktober",
          "November",
          "Desember",
        ];

        const namaHari = hari[sekarang.getDay()];
        const tanggal = sekarang.getDate();
        const namaBulan = bulan[sekarang.getMonth()];
        const tahun = sekarang.getFullYear();

        let jam = sekarang.getHours().toString().padStart(2, "0");
        let menit = sekarang.getMinutes().toString().padStart(2, "0");
        let detik = sekarang.getSeconds().toString().padStart(2, "0");

        document.getElementById("waktu").innerHTML =
          `${namaHari}, ${tanggal} ${namaBulan} ${tahun} • ${jam}:${menit}:${detik}`;
      }

      updateWaktu();

      setInterval(updateWaktu, 1000);
    </script>
  </body>
</html>
